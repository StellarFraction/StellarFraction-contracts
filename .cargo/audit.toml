# Configuration for `cargo audit` (RustSec advisory scanning).
# Run locally with:  cargo install cargo-audit && cargo audit
# See https://github.com/rustsec/rustsec/tree/main/cargo-audit

[advisories]
# Advisory IDs to ignore, with a justification comment for each. Keep this
# list empty by default; only add an entry when an advisory is reviewed and
# confirmed not to affect this contract, and note why + a re-check date.
ignore = []

# Fail the audit on any unmaintained or yanked crate, not just vulnerabilities.
informational_warnings = ["unmaintained", "unsound", "yanked"]

# Treat warnings as errors so CI blocks on them.
severity_threshold = "low"

[output]
# Deny (exit non-zero) when advisories are found, so it is CI-friendly.
deny = ["warnings", "unmaintained", "unsound", "yanked"]
quiet = false
